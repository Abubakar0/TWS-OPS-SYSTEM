<div class="app-shell">
  <div class="app-shell__backdrop" [class.is-open]="sidebarOpen()" (click)="closeSidebar()"></div>

  <aside class="app-sidebar" [class.is-open]="sidebarOpen()">
    <div class="app-sidebar__brand">
      <a class="brand-lockup" routerLink="/">
        <span class="brand-lockup__mark">TW</span>
        <span class="brand-lockup__text">
          <strong>Trend Wave</strong>
          <small>Ops platform</small>
        </span>
      </a>

      <button
        mat-icon-button
        type="button"
        class="app-sidebar__close"
        (click)="closeSidebar()"
        matTooltip="Close menu"
      >
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <div class="app-sidebar__body">
      <nav class="sidebar-nav" aria-label="Sidebar navigation">
        @for (item of sidebarNavItems(); track item.route) {
          <a
            class="sidebar-nav__item"
            [routerLink]="item.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: item.exact }"
            (click)="closeSidebar()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span>{{ item.label }}</span>
          </a>
        }
      </nav>
    </div>

    <div class="app-sidebar__footer">
      <button mat-button type="button" class="sidebar-user" [matMenuTriggerFor]="userMenu">
        <span class="user-avatar">{{ userInitials() }}</span>
        <span class="sidebar-user__meta">
          <strong>{{ user()?.name }}</strong>
          <small>{{ user()?.email }}</small>
        </span>
        <mat-icon>expand_more</mat-icon>
      </button>
    </div>
  </aside>

  <div class="app-frame">
    <button
      mat-icon-button
      type="button"
      class="app-mobile-toggle mobile-only"
      (click)="toggleSidebar()"
      matTooltip="Open menu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <main class="app-main">
      <router-outlet />
    </main>
  </div>
</div>

<mat-menu #userMenu="matMenu" xPosition="before" class="tw-menu">
  <div class="menu-panel">
    <div class="menu-panel__header">
      <strong>{{ user()?.name }}</strong>
      <span>{{ user()?.email }}</span>
    </div>
    <div class="menu-item menu-item--compact">
      <mat-icon>badge</mat-icon>
      <div>
        <strong>{{ roleLabel() }}</strong>
        <span>Assigned role</span>
      </div>
    </div>

    <button mat-menu-item type="button" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Log out</span>
    </button>
  </div>
</mat-menu>
