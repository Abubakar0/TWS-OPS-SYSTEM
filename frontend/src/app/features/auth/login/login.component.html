<main class="login-shell">
  <div class="login-stage">
    <div class="login-stage__waves" aria-hidden="true">
      <span class="wave wave--1"></span>
      <span class="wave wave--2"></span>
      <span class="wave wave--3"></span>
      <span class="wave wave--4"></span>
    </div>

    <section class="login-card">
      <div class="login-brand">
        <span class="login-brand__eyebrow">TrendWave</span>
        <h1>Ops System</h1>
      </div>

      @if (redirecting()) {
        <div class="status-banner">
          <mat-spinner diameter="20"></mat-spinner>
          <span>Opening your workspace.</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          @if (fieldError('email')) {
            <mat-error>{{ fieldError('email') }}</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (fieldError('password')) {
            <mat-error>{{ fieldError('password') }}</mat-error>
          }
        </mat-form-field>

        @if (error()) {
          <div class="error-message">{{ error() }}</div>
        }

        <button
          mat-flat-button
          color="primary"
          type="submit"
          [disabled]="form.invalid || loading() || redirecting()"
        >
          @if (loading() || redirecting()) {
            <mat-spinner diameter="18"></mat-spinner>
          } @else {
            <mat-icon>login</mat-icon>
          }
          <span>{{ redirecting() ? 'Opening Workspace' : 'Sign In' }}</span>
        </button>
      </form>
    </section>
  </div>
</main>
